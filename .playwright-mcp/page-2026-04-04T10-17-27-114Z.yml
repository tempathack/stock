              - heading "Notes:" [level=4] [ref=e170]
              - paragraph [ref=e171]:
                - text: "BEA Account Code: DPCCRG"
                - text: The Personal Consumption Expenditures Price Index is a measure of the prices that people living in the United States, or those buying on their behalf, pay for goods and services. The change in the PCE price index is known for capturing inflation (or deflation) across a wide range of consumer expenses and reflecting changes in consumer behavior. For example, if car prices rise, car sales may decline while bicycle sales increase.
                - text: The PCE Price Index is produced by the Bureau of Economic Analysis (BEA), which revises previously published PCE data to reflect updated information or new methodology, providing consistency across decades of data that's valuable for researchers. They also offer the series as a Chain-Type index and excluding food and energy products, as above. The PCE price index less food excluding food and energy is used primarily for macroeconomic analysis and forecasting future values of the PCE price index.
                - text: The PCE Price Index is similar to the Bureau of Labor Statistics' consumer price index for urban consumers. The two indexes, which have their own purposes and uses, are constructed differently, resulting in different inflation rates.
                - text: "For more information on the PCE price index, see:"
                - text: U.S. Bureau of Economic Analysis,
                - link "Guide to the National Income and Product Accounts of the United States (NIPA)" [ref=e172] [cursor=pointer]:
                  - /url: https://www.bea.gov/national/pdf/nipaguid.pdf
                - text: U.S. Bureau of Economic Analysis,
                - link "Personal Consumption Expenditures Price Index" [ref=e173] [cursor=pointer]:
                  - /url: https://www.bea.gov/data/personal-consumption-expenditures-price-index
                - text: U.S. Bureau of Economic Analysis,
                - link "Prices & Inflation" [ref=e174] [cursor=pointer]:
                  - /url: https://www.bea.gov/resources/learning-center/what-to-know-prices-inflation
                - text: U.S. Bureau of Labor Statistics,
                - link "Differences between the Consumer Price Index and the Personal Consumption Expenditure Price Index" [ref=e175] [cursor=pointer]:
                  - /url: https://www.bls.gov/opub/btn/archive/differences-between-the-consumer-price-index-and-the-personal-consumption-expenditures-price-index.pdf
