              - heading "Notes:" [level=4] [ref=e171]
              - paragraph [ref=e172]:
                - text: Total Nonfarm Job Openings are a measure of all jobs that are not filled on the last business day of the month. A job is considered open if a specific position exists and there is work available for it, the job can be started within 30 days, and there is active recruiting for the position.
                - text: Total Nonfarm Job Openings are measured by the Job Openings and Labor Turnover Survey (JOLTS) and published by the Bureau of Labor Statistics (BLS). These data are a unique economic indicator of unmet demand for labor and labor shortages. Economists, government officials, and researchers use Job Openings as a measure of tightness within job markets.
                - text: Note that the set of available job openings may decline because openings become filled, or because previous openings are removed without filling positions.
                - text: "For more information, see:"
                - text: U.S. Bureau of Labor Statistics,
                - link "Job Openings and Labor Turnover Survey Overview Page" [ref=e173] [cursor=pointer]:
                  - /url: https://www.bls.gov/jlt/jltover.htm#purpose
                - text: U.S. Bureau of Labor Statistics,
