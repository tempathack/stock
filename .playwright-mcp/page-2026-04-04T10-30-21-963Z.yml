              - paragraph [ref=e178]:
                - text: This data represents the Option-Adjusted Spread (OAS) of the ICE BofA US Corporate BB Index, a subset of the ICE BofA US High Yield Master II Index tracking the performance of US dollar denominated below investment grade rated corporate debt publicly issued in the US domestic market. This subset includes all securities with a given investment grade rating BB.
                - text: The ICE BofA OASs are the calculated spreads between a computed OAS index of all bonds in a given rating category and a spot Treasury curve. An OAS index is constructed using each constituent bond's OAS, weighted by market capitalization. When the last calendar day of the month takes place on the weekend, weekend observations will occur as a result of month ending accrued interest adjustments.
