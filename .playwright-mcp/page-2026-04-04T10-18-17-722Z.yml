              - paragraph
              - paragraph [ref=e171]:
                - text: The Federal Reserve's monthly index of industrial production and the related capacity indexes and capacity utilization rates cover manufacturing, mining, and electric and gas utilities. The industrial sector, together with construction, accounts for the bulk of the variation in national output over the course of the business cycle. The industrial detail provided by these measures helps illuminate structural developments in the economy. The industrial production (IP) index measures the real output of all relevant establishments located in the United States, regardless of their ownership, but not those located in U.S. territories. For more information, see the
                - link "explanatory notes" [ref=e172] [cursor=pointer]:
                  - /url: https://www.federalreserve.gov/releases/g17/About.htm
                - text: issued by the Board of Governors. For recent updates, see the
                - link "announcements" [ref=e173] [cursor=pointer]:
