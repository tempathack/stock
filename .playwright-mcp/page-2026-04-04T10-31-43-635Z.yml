              - paragraph [ref=e173]:
                - text: The Chicago Fed’s National Financial Conditions Index (NFCI) provides a comprehensive weekly update on U.S. financial conditions in money markets, debt and equity markets and the traditional and “shadow” banking systems. Positive values of the NFCI indicate financial conditions that are tighter than average, while negative values indicate financial conditions that are looser than average.
                - text: The adjusted NFCI (ANFCI). This index isolates a component of financial conditions uncorrelated with economic conditions to provide an update on how financial conditions compare with current economic conditions.
