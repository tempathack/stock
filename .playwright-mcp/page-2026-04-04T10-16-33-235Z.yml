              - heading "Notes:" [level=4] [ref=e170]
              - paragraph [ref=e171]:
                - text: "The STLFSI4 measures the degree of financial stress in the markets and is constructed from 18 weekly data series: seven interest rate series, six yield spreads and five other indicators. Each of these variables captures some aspect of financial stress. Accordingly, as the level of financial stress in the economy changes, the data series are likely to move together."
                - text: "How to Interpret the Index:"
                - text: The average value of the index, which begins in late 1993, is designed to be zero. Thus, zero is viewed as representing normal financial market conditions. Values below zero suggest below-average financial market stress, while values above zero suggest above-average financial market stress.
                - text: "More information:"
                - text: The STLFSI4 is the third revision (i.e.,
                - link "STLFSI3" [ref=e172] [cursor=pointer]:
                  - /url: https://fred.stlouisfed.org/series/STLFSI3
                - text: and
                - link "STLFSI2" [ref=e173] [cursor=pointer]:
                  - /url: https://fred.stlouisfed.org/series/STLFSI2
                - text: of the original
                - link "STLFSI" [ref=e174] [cursor=pointer]:
                  - /url: https://fred.stlouisfed.org/series/STLFSI
                - text: . Whereas the STLFSI3 used the past
                - link "90-day average backward-looking secured overnight financing rate (SOFR)" [ref=e175] [cursor=pointer]:
                  - /url: https://fred.stlouisfed.org/series/SOFR90DAYAVG
                - text: in two of their yield spreads, the STLFSI4 uses
                - link "the 90-day forward-looking SOFR" [ref=e176] [cursor=pointer]:
                  - /url: https://www.cmegroup.com/market-data/cme-group-benchmark-administration/term-sofr.html
                - text: in its place. For more information, see
                - link "\"The St. Louis Fed’s Financial Stress Index, Version 4.0\"" [ref=e177] [cursor=pointer]:
                  - /url: https://fredblog.stlouisfed.org/2022/11/the-st-louis-feds-financial-stress-index-version-4/
                - text: . For information on earlier STLFSIs, see
                - link "\"Measuring Financial Market Stress\"" [ref=e178] [cursor=pointer]:
                  - /url: https://files.stlouisfed.org/files/htdocs/publications/es/10/ES1002.pdf
                - text: ","
                - link "\"The St. Louis Fed’s Financial Stress Index, Version 2.0.\"" [ref=e179] [cursor=pointer]:
                  - /url: https://fredblog.stlouisfed.org/2020/03/the-st-louis-feds-financial-stress-index-version-2-0/
                - text: ", and"
                - link "\"The St. Louis Fed’s Financial Stress Index, Version 3.0\"" [ref=e180] [cursor=pointer]:
                  - /url: https://fredblog.stlouisfed.org/2022/01/the-st-louis-feds-financial-stress-index-version-3-0/
                - text: .
