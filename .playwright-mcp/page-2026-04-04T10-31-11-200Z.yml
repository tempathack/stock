              - paragraph [ref=e173]:
                - text: Starting July 29, 2021, the interest rate on excess reserves (
                - link "IOER" [ref=e174] [cursor=pointer]:
                  - /url: https://fred.stlouisfed.org/series/IOER
                - text: ) and the interest rate on required reserves (
                - link "IORR" [ref=e175] [cursor=pointer]:
                  - /url: https://fred.stlouisfed.org/series/IORR
                - text: ) were replaced with a single rate, the interest rate on reserve balances (
                - link "IORB" [ref=e176] [cursor=pointer]:
                  - /url: https://fred.stlouisfed.org/series/IORB
                - text: ). See the source's
                - link "announcement" [ref=e177] [cursor=pointer]:
                  - /url: https://www.federalreserve.gov/newsevents/pressreleases/bcreg20210602a.htm
                - text: for more details.
                - text: The interest rate on reserve balances (IORB rate) is the rate of interest that the Federal Reserve pays on balances maintained by or on behalf of eligible institutions in master accounts at Federal Reserve Banks. The interest rate is set by the Board of Governors, and it is an important tool of monetary policy.
                - text: See
                - link "Policy Tools" [ref=e178] [cursor=pointer]:
                  - /url: https://www.federalreserve.gov/monetarypolicy/reqresbalances.htm
                - text: and the
                - link "IORB FAQs" [ref=e179] [cursor=pointer]:
                  - /url: https://www.federalreserve.gov/monetarypolicy/iorb-faqs.htm
                - text: for more information.
                - text: For questions on FRED functionality, please contact us
