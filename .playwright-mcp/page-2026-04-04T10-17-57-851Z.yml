              - heading "Notes:" [level=4] [ref=e174]
              - paragraph [ref=e175]:
                - text: "The Chicago Fed’s National Financial Conditions Index (NFCI) provides a comprehensive weekly update on U.S. financial conditions in money markets, debt and equity markets and the traditional and “shadow” banking systems. Source:"
                - link "http://www.chicagofed.org/webpages/publications/nfci/index.cfm" [ref=e176] [cursor=pointer]:
                  - /url: http://www.chicagofed.org/webpages/publications/nfci/index.cfm
                - text: .
                - text: "\"Positive values of the NFCI indicate financial conditions that are tighter than average, while negative values indicate financial conditions that are looser than average.\""
                - text: "\"The three subindexes of the NFCI (risk, credit and leverage) allow for a more detailed examination of the movements in the NFCI. Like the NFCI, each is constructed to have an average value of zero and a standard deviation of one over a sample period extending back to 1971. The risk subindex captures volatility and funding risk in the financial sector; the credit subindex is composed of measures of credit conditions; and the leverage subindex consists of debt and equity measures. Increasing risk, tighter credit conditions and declining leverage are consistent with tightening financial conditions. Thus, a positive value for an individual subindex indicates that the corresponding aspect of financial conditions is tighter than on average, while negative values indicate the opposite.\" Source:"
                - link "http://www.chicagofed.org/webpages/research/data/nfci/background.cfm" [ref=e177] [cursor=pointer]:
                  - /url: http://www.chicagofed.org/webpages/research/data/nfci/background.cfm
                - text: .
                - text: For further information, please visit the Federal Reserve Bank of Chicago's NFCI website at
                - link "http://www.chicagofed.org/webpages/publications/nfci/index.cfm" [ref=e178] [cursor=pointer]:
                  - /url: http://www.chicagofed.org/webpages/publications/nfci/index.cfm
                - text: .
