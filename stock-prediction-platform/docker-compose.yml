services:
  api:
    image: stock-prediction-api:latest
    ports:
      - "8010:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://stockuser:stockpassword@postgres:5432/stockdb
    depends_on:
      - redis
      - postgres

  kafka-consumer:
    image: stock-prediction-consumer:latest
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - DATABASE_URL=postgresql://stockuser:${POSTGRES_PASSWORD:-stockpassword}@postgres:5432/stockdb
    depends_on:
      - kafka
      - postgres

  postgres:
    image: timescale/timescaledb:latest-pg15
    ports:
      - "5436:5432"
    environment:
      - POSTGRES_USER=stockuser
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-stockpassword}
      - POSTGRES_DB=stockdb

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    depends_on:
      - zookeeper

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    ports:
      - "2181:2181"
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  frontend:
    build: ./services/frontend
    ports:
      - "3002:80"
    environment:
      - VITE_API_URL=http://api:8000
    depends_on:
      - api

  ml-pipeline:
    build:
      context: .
      dockerfile: ml/Dockerfile
    image: stock-ml-pipeline:latest
    environment:
      - DATABASE_URL=postgresql://stockuser:${POSTGRES_PASSWORD:-stockpassword}@postgres:5432/stockdb
      - MODEL_REGISTRY_DIR=/data/model_registry
      - SERVING_DIR=/data/models/active
      - DRIFT_LOG_DIR=/data/drift_logs
      - TICKERS=AAPL,MSFT,GOOGL,AMZN,NVDA,META,TSLA,BRK-B,JPM,JNJ,V,PG,UNH,HD,MA,BAC,XOM,PFE,ABBV,CVX
    depends_on:
      - postgres

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

  loki:
    image: grafana/loki:2.9.6
    ports:
      - "3101:3100"
    command: -config.file=/etc/loki/local-config.yaml

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3003:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
    depends_on:
      - prometheus
      - loki
