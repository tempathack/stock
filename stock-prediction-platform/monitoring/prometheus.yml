global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: stock-api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  - job_name: kafka-consumer
    static_configs:
      - targets: ["kafka-consumer:9090"]
    metrics_path: /metrics
