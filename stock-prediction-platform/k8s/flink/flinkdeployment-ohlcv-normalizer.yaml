apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  name: ohlcv-normalizer
  namespace: flink
  labels:
    app.kubernetes.io/part-of: stock-prediction-platform
    app.kubernetes.io/component: flink-job
spec:
  image: stock-flink-ohlcv-normalizer:latest
  imagePullPolicy: Never  # minikube local image — no registry pull needed
  flinkVersion: v1_19
  serviceAccount: flink

  flinkConfiguration:
    taskmanager.numberOfTaskSlots: "2"

    # Prometheus metrics reporter
    metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
    metrics.reporter.prom.port: "9249"

    # RocksDB state backend with incremental checkpointing
    state.backend: rocksdb
    state.backend.incremental: "true"
    # Checkpoints written to MinIO (s3 path-style access for non-AWS endpoints)
    state.checkpoints.dir: s3://model-artifacts/flink-checkpoints/ohlcv-normalizer
    s3.endpoint: http://minio.storage.svc.cluster.local:9000
    s3.path.style.access: "true"
    # s3.access.key and s3.secret.key are NOT set here — the flink-s3-fs-presto plugin
    # resolves credentials from AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY env vars,
    # which are injected via the minio-secrets secretRef below.

    # Checkpointing policy
    execution.checkpointing.interval: "30s"
    execution.checkpointing.mode: EXACTLY_ONCE

    # Exponential-delay restart strategy for transient Kafka/JDBC failures
    restart-strategy.type: exponential-delay
    restart-strategy.exponential-delay.initial-backoff: 1s
    restart-strategy.exponential-delay.max-backoff: 60s

  jobManager:
    resource:
      memory: "1024m"
      cpu: 0.5

  taskManager:
    resource:
      memory: "1024m"
      cpu: 0.5

  podTemplate:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9249"
        prometheus.io/path: "/"
    spec:
      containers:
        - name: flink-main-container
          env:
            # Enable the built-in S3 Presto plugin so Flink can write checkpoints to MinIO
            - name: ENABLE_BUILT_IN_PLUGINS
              value: "flink-s3-fs-presto-1.19.0.jar"
          envFrom:
            # Application config (Kafka + Postgres addresses, DB name, user)
            - configMapRef:
                name: flink-config
            # POSTGRES_PASSWORD — same stock-platform-secrets Secret used by other namespaces.
            # NOTE: stock-platform-secrets must be copied to the flink namespace in deploy-all.sh
            # before this FlinkDeployment is applied:
            #   kubectl get secret stock-platform-secrets -n storage -o yaml \
            #     | sed 's/namespace: storage/namespace: flink/' \
            #     | kubectl apply -f -
            - secretRef:
                name: stock-platform-secrets
            # MinIO credentials (MINIO_ROOT_USER → AWS_ACCESS_KEY_ID, MINIO_ROOT_PASSWORD → AWS_SECRET_ACCESS_KEY)
            # Required by the flink-s3-fs-presto plugin for checkpoint bucket access.
            # NOTE: minio-secrets must also be copied to the flink namespace in deploy-all.sh.
            - secretRef:
                name: minio-secrets

  job:
    entryClass: "org.apache.flink.client.python.PythonDriver"
    args:
      - "-pyclientexec"
      - "/usr/local/bin/python3"
      - "-py"
      - "/opt/flink/usrlib/ohlcv_normalizer.py"
    parallelism: 1
    upgradeMode: stateful
    state: running
