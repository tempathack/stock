apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-flink
  namespace: monitoring
data:
  flink-stream.json: |
    {
      "title": "Apache Flink \u2014 Stream Processing",
      "uid": "flink-stream",
      "version": 1,
      "schemaVersion": 36,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "title": "Job Uptime",
          "type": "stat",
          "gridPos": { "h": 6, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "displayName": "${__field.labels.job_name}"
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none"
          },
          "targets": [
            {
              "expr": "flink_jobmanager_job_uptime",
              "legendFormat": "{{job_name}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Records Out Per Second",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "rps",
              "displayName": "${__field.labels.job_name}"
            }
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "none" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "expr": "flink_taskmanager_job_task_numRecordsOutPerSecond",
              "legendFormat": "{{job_name}}",
              "refId": "A"
            }
          ]
        }
      ]
    }
