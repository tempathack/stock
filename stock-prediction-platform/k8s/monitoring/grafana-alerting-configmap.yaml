apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerting-rules
  namespace: monitoring
data:
  loki-alerts.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: loki-log-alerts
        folder: Alerting
        interval: 1m
        rules:
          - uid: loki-high-error-log-rate
            title: "High Error Log Rate (Loki)"
            condition: C
            data:
              - refId: A
                queryType: range
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: loki
                model:
                  expr: 'sum(rate({namespace=~".+"} |= "ERROR" [5m]))'
                  queryType: range
              - refId: C
                datasourceUid: __expr__
                model:
                  type: threshold
                  conditions:
                    - evaluator:
                        params: [1]
                        type: gt
                      query:
                        params: [A]
            noDataState: NoData
            execErrState: Error
            for: 5m
            labels:
              severity: warning
              team: platform
            annotations:
              summary: "High ERROR log rate across namespaces"
              description: "Error log rate has exceeded 1 line/s for 5 minutes."
