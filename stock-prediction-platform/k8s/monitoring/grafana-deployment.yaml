apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.0
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: grafana-dashboard-api-health
              mountPath: /var/lib/grafana/dashboards/api-health.json
              subPath: api-health.json
            - name: grafana-dashboard-ml-perf
              mountPath: /var/lib/grafana/dashboards/ml-performance.json
              subPath: ml-performance.json
            - name: grafana-dashboard-kafka
              mountPath: /var/lib/grafana/dashboards/kafka-infra.json
              subPath: kafka-infra.json
            - name: grafana-dashboard-flink
              mountPath: /var/lib/grafana/dashboards/flink-stream.json
              subPath: flink-stream.json
      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: grafana-dashboard-api-health
          configMap:
            name: grafana-dashboard-api-health
        - name: grafana-dashboard-ml-perf
          configMap:
            name: grafana-dashboard-ml-perf
        - name: grafana-dashboard-kafka
          configMap:
            name: grafana-dashboard-kafka
        - name: grafana-dashboard-flink
          configMap:
            name: grafana-dashboard-flink
