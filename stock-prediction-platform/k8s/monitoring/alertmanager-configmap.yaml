apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: "null"
      group_by: ["alertname", "namespace"]
      group_wait: 5m
      group_interval: 10m
      repeat_interval: 1h

    receivers:
      - name: "null"

    # ---------------------------------------------------------------------------
    # Slack receiver — uncomment and fill in values to enable notifications
    # ---------------------------------------------------------------------------
    # receivers:
    #   - name: slack-notifications
    #     slack_configs:
    #       - api_url: "https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK"
    #         channel: "#alerts"
    #         send_resolved: true
    #         title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}'
    #         text: >-
    #           {{ range .Alerts }}
    #           *Alert:* {{ .Annotations.summary }}
    #           *Description:* {{ .Annotations.description }}
    #           *Severity:* {{ .Labels.severity }}
    #           *Namespace:* {{ .Labels.namespace }}
    #           {{ end }}
    #
    # To activate Slack routing, replace the top-level route receiver with
    # "slack-notifications" and remove (or rename) the "null" receiver above.
