apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
  namespace: storage
  labels:
    app: postgresql
    app.kubernetes.io/part-of: stock-prediction-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
        - name: postgresql
          image: timescale/timescaledb:latest-pg15
          args:
            - "-c"
            - "wal_level=logical"
            - "-c"
            - "max_replication_slots=5"
            - "-c"
            - "max_wal_senders=5"
          ports:
            - containerPort: 5432
          envFrom:
            - configMapRef:
                name: storage-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stock-platform-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "stockuser", "-d", "stockdb"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "stockuser", "-d", "stockdb"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: postgresql-data
          persistentVolumeClaim:
            claimName: postgresql-pvc
        - name: init-sql
          configMap:
            name: postgresql-init-sql
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: storage
  labels:
    app: postgresql
spec:
  selector:
    app: postgresql
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
