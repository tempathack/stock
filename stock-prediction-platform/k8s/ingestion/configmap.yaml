apiVersion: v1
kind: ConfigMap
metadata:
  name: ingestion-config
  namespace: ingestion
data:
  KAFKA_BOOTSTRAP_SERVERS: "kafka-kafka-bootstrap.storage.svc.cluster.local:9092"
  INTRADAY_TOPIC: "intraday-data"
  HISTORICAL_TOPIC: "historical-data"
  API_BASE_URL: "http://stock-api.ingestion.svc.cluster.local:8000"
  LOG_LEVEL: "INFO"
  RATE_LIMIT_GLOBAL: "100/minute"
  RATE_LIMIT_PREDICT: "30/minute"
  RATE_LIMIT_INGEST: "10/minute"
  MODEL_FRESHNESS_THRESHOLD_DAYS: "7"
  PREDICTION_STALENESS_HOURS: "24"
  AB_TESTING_ENABLED: "false"
  AB_LOG_ASSIGNMENTS: "true"
  KSERVE_INFERENCE_URL: "http://stock-model-serving-predictor.ml.svc.cluster.local:80/v2/models/stock-model-serving/infer"
  KSERVE_MODEL_NAME: "stock-model-serving"
  KSERVE_TIMEOUT_SECONDS: "30"
  KSERVE_ENABLED: "true"
  KSERVE_CANARY_URL: "http://stock-model-serving-canary-predictor.ml.svc.cluster.local:80"
  MINIO_ENDPOINT: "http://minio.storage.svc.cluster.local:9000"
  MINIO_BUCKET_MODELS: "model-artifacts"
  MINIO_SERVING_PREFIX: "serving/active"
  TICKER_SYMBOLS: "NVDA,AMD,TSLA,META,AMZN,GOOGL,AVGO,AMAT,AXON,DXCM,ALGN,BLDR,BX,CEG,DVN,FANG,APA,ALB,CZR,BBWI,DAL,AAL,CCL,DHI,CF,ABNB,SCHW,CDNS,ADSK,ANET"
