apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-api
  namespace: ingestion
  labels:
    app: stock-api
    app.kubernetes.io/part-of: stock-prediction-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stock-api
  template:
    metadata:
      labels:
        app: stock-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
        kubectl.kubernetes.io/restartedAt: "2026-04-08T19:40:00Z"
    spec:
      containers:
        - name: stock-api
          image: stock-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ingestion-config
            - secretRef:
                name: minio-secrets
          env:
            - name: SERVICE_NAME
              value: "stock-api"
            - name: APP_VERSION
              value: "1.0.0"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: stock-platform-secrets
                  key: DATABASE_URL_READONLY
            - name: DATABASE_URL_ADMIN
              valueFrom:
                secretKeyRef:
                  name: stock-platform-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              value: "redis://redis.storage.svc.cluster.local:6379/0"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "3Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
