apiVersion: batch/v1
kind: CronJob
metadata:
  name: historical-ingestion
  namespace: ingestion
  labels:
    app: historical-ingestion
    app.kubernetes.io/part-of: stock-prediction-platform
spec:
  # Run every Sunday at 02:00 UTC
  schedule: "0 2 * * 0"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        metadata:
          labels:
            app: historical-ingestion
        spec:
          restartPolicy: OnFailure
          containers:
            - name: historical-trigger
              image: stock-api:latest
              imagePullPolicy: Never
              command: ["python", "-m", "app.jobs.trigger_historical"]
              envFrom:
                - configMapRef:
                    name: ingestion-config
              env:
                - name: TRIGGER_TIMEOUT_SECONDS
                  value: "600"
              resources:
                requests:
                  cpu: "200m"
                  memory: "512Mi"
                limits:
                  cpu: "1000m"
                  memory: "1Gi"
