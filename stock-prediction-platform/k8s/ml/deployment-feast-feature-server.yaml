# ConfigMap containing feature_store.yaml content
apiVersion: v1
kind: ConfigMap
metadata:
  name: feast-feature-store-config
  namespace: ml
  labels:
    app.kubernetes.io/part-of: stock-prediction-platform
    app.kubernetes.io/component: feast-feature-server
data:
  feature_store.yaml: |
    project: stock_prediction
    provider: local
    entity_key_serialization_version: 3
    registry:
      registry_type: sql
      path: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      cache_ttl_seconds: 60
      sqlalchemy_config_kwargs:
        echo: false
        pool_pre_ping: true
    offline_store:
      type: postgres
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      database: ${POSTGRES_DB}
      db_schema: public
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
    online_store:
      type: redis
      connection_string: "${REDIS_HOST}:${REDIS_PORT}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: feast-feature-server
  namespace: ml
  labels:
    app: feast-feature-server
    app.kubernetes.io/part-of: stock-prediction-platform
    app.kubernetes.io/component: feast-feature-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: feast-feature-server
  template:
    metadata:
      labels:
        app: feast-feature-server
    spec:
      containers:
        - name: feature-server
          image: feastdev/feature-server:0.46.0
          ports:
            - containerPort: 6566
              name: http
          envFrom:
            - configMapRef:
                name: ml-pipeline-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stock-platform-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_USER
              value: "stockuser"
          volumeMounts:
            - name: feast-config
              mountPath: /app/ml/feature_store
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 6566
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 6566
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
      volumes:
        - name: feast-config
          configMap:
            name: feast-feature-store-config
---
apiVersion: v1
kind: Service
metadata:
  name: feast-feature-server
  namespace: ml
  labels:
    app: feast-feature-server
    app.kubernetes.io/part-of: stock-prediction-platform
spec:
  selector:
    app: feast-feature-server
  ports:
    - name: http
      port: 6566
      targetPort: 6566
  type: ClusterIP
