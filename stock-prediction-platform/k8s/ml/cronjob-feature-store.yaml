apiVersion: batch/v1
kind: CronJob
metadata:
  name: daily-feature-store
  namespace: ml
  labels:
    app: daily-feature-store
    app.kubernetes.io/part-of: stock-prediction-platform
    app.kubernetes.io/component: ml-features
spec:
  schedule: "0 18 * * 1-5"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app: daily-feature-store
        spec:
          restartPolicy: OnFailure
          containers:
            - name: feature-compute
              image: stock-ml-pipeline:latest
              imagePullPolicy: Never
              command: ["python", "-m", "ml.features.store"]
              args:
                - "--compute-all"
              envFrom:
                - configMapRef:
                    name: ml-pipeline-config
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: stock-platform-secrets
                      key: DATABASE_URL_WRITER
              volumeMounts:
                - name: model-artifacts
                  mountPath: /data
              resources:
                requests:
                  cpu: "500m"
                  memory: "1Gi"
                limits:
                  cpu: "1000m"
                  memory: "2Gi"
          volumes:
            - name: model-artifacts
              persistentVolumeClaim:
                claimName: model-artifacts-pvc
