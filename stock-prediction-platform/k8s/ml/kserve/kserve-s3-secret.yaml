# IMPORTANT: This file contains real credentials. NEVER commit to version control.
# It is listed in .gitignore. Copy from kserve-s3-secret.yaml.example and fill in real base64 values.
#
# Credentials MUST match k8s/storage/minio-secrets.yaml values.
# To encode: echo -n 'yourpassword' | base64
# To decode: echo 'base64string' | base64 -d

apiVersion: v1
kind: Secret
metadata:
  name: kserve-s3-credentials
  namespace: ml
  labels:
    app: kserve
    app.kubernetes.io/part-of: stock-prediction-platform
  annotations:
    serving.kserve.io/s3-endpoint: minio.storage.svc.cluster.local:9000
    serving.kserve.io/s3-usehttps: "0"
    serving.kserve.io/s3-region: us-east-1
    serving.kserve.io/s3-verifyssl: "0"
type: Opaque
data:
  # echo -n 'minioadmin' | base64
  AWS_ACCESS_KEY_ID: bWluaW9hZG1pbg==
  # echo -n 'minioadmin123' | base64
  AWS_SECRET_ACCESS_KEY: bWluaW9hZG1pbjEyMw==
