###############################################################################
# KServe InferenceService — Primary Model Serving
# Phase 55: Replaces legacy uvicorn model-serving Deployment
#
# V2 Inference Protocol endpoints (after deployment):
#   POST /v2/models/stock-model-serving/infer   — prediction
#   GET  /v2/models/stock-model-serving/ready    — readiness
#   GET  /v2/models/stock-model-serving          — model metadata
#   GET  /v2/health/ready                         — server health
#
# Internal service DNS (RawDeployment mode):
#   stock-model-serving-predictor.ml.svc.cluster.local:80
###############################################################################
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: stock-model-serving
  namespace: ml
  labels:
    app: kserve
    app.kubernetes.io/part-of: stock-prediction-platform
    app.kubernetes.io/component: model-inference
    variant: primary
  annotations:
    description: "Primary KServe InferenceService for stock prediction sklearn models"
    sidecar.istio.io/inject: "false"
spec:
  transformer:
    containers:
      - name: feast-transformer
        image: stock-feast-transformer:latest
        imagePullPolicy: Never
        args:
          - --model_name=stock-model-serving
        env:
          - name: FEAST_STORE_PATH
            value: "/opt/feast"
          - name: REDIS_HOST
            value: "redis.storage.svc.cluster.local"
          - name: REDIS_PORT
            value: "6379"
        volumeMounts:
          - name: feast-config
            mountPath: /opt/feast
            readOnly: true
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
    volumes:
      - name: feast-config
        configMap:
          name: feast-feature-store-config
  predictor:
    serviceAccountName: kserve-s3-sa
    minReplicas: 1
    maxReplicas: 3
    model:
      modelFormat:
        name: sklearn
        version: "1"
      runtime: stock-sklearn-mlserver
      protocolVersion: v2
      storageUri: "s3://model-artifacts/serving/active"
      resources:
        requests:
          cpu: "500m"
          memory: "1Gi"
        limits:
          cpu: "2000m"
          memory: "4Gi"
