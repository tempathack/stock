apiVersion: batch/v1
kind: CronJob
metadata:
  name: weekly-training
  namespace: ml
  labels:
    app: weekly-training
    app.kubernetes.io/part-of: stock-prediction-platform
    app.kubernetes.io/component: ml-training
spec:
  schedule: "0 3 * * 0"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 86400
      template:
        metadata:
          labels:
            app: weekly-training
        spec:
          restartPolicy: OnFailure
          containers:
            - name: training
              image: stock-ml-pipeline:latest
              imagePullPolicy: Never
              command: ["python", "-m", "ml.pipelines.training_pipeline"]
              args:
                - "--registry-dir"
                - "$(MODEL_REGISTRY_DIR)"
                - "--serving-dir"
                - "$(SERVING_DIR)"
                - "--skip-shap"
                - "--horizons"
                - "1,7,14,30"
              envFrom:
                - configMapRef:
                    name: ml-pipeline-config
                - configMapRef:
                    name: minio-config
                - secretRef:
                    name: minio-secrets
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: stock-platform-secrets
                      key: DATABASE_URL_WRITER
                - name: STORAGE_BACKEND
                  value: "s3"
                - name: TICKERS
                  value: "A,AAL,AAPL,ABBV,ABNB,ABT,ACGL,ACN,ADBE,ADI,ADM,ADP,ADSK,AEE,AEP,AES,AFL,AIG,AIZ,AJG,AKAM,ALB,ALGN,ALL,ALLE,AMAT,AMCR,AMD,AME,AMGN,AMP,AMT,AMZN,ANET,AON,AOS,APA,APD,APH,APTV,ARE,ATO,AVB,AVGO,AVY,AWK,AXON,AXP,AZO,BA,BAC,BALL,BAX,BBWI,BBY,BDX,BG,BIIB,BKR,BLDR,BLK,BMY,BR,BRK-B,BSX,BWA,BX,C,CAG,CAH,CARR,CAT,CB,CBOE,CBRE,CCI,CCL,CDNS,CDW,CE,CEG,CF,CFG,CHD,CHTR,CI,CINF,CL,CLX,CMCSA,CME,CMG,CMI,CMS,CNC,COF,COO,COP,COR,COST,CPB,CPRT,CPT,CRL,CSCO,CSGP,CSX,CTAS,CTRA,CTSH,CTVA,CVS,CVX,CZR,D,DAL,DD,DE,DG,DHI,DHR,DLR,DLTR,DOV,DOW,DPZ,DRI,DTE,DUK,DVA,DVN,DXCM,ED,EMN,ETN,FANG,GLW,GOOG,GOOGL,HD,JNJ,JPM,KMX,KO,LNT,MA,META,MMM,MO,MSFT,NVDA,PFE,PG,SCHW,STZ,T,TSLA,UNH,V,XOM"
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: stock-platform-secrets
                      key: POSTGRES_PASSWORD
                - name: POSTGRES_USER
                  value: "stockuser"
                - name: LINEAR_ONLY
                  value: "false"
              resources:
                requests:
                  cpu: "4000m"
                  memory: "8Gi"
                limits:
                  cpu: "16000m"
                  memory: "16Gi"
