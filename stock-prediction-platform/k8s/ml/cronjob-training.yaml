apiVersion: batch/v1
kind: CronJob
metadata:
  name: weekly-training
  namespace: ml
  labels:
    app: weekly-training
    app.kubernetes.io/part-of: stock-prediction-platform
    app.kubernetes.io/component: ml-training
spec:
  schedule: "0 3 * * 0"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app: weekly-training
        spec:
          restartPolicy: OnFailure
          containers:
            - name: training
              image: stock-ml-pipeline:latest
              imagePullPolicy: Never
              command: ["python", "-m", "ml.pipelines.training_pipeline"]
              args:
                - "--registry-dir"
                - "$(MODEL_REGISTRY_DIR)"
                - "--serving-dir"
                - "$(SERVING_DIR)"
                - "--skip-shap"
              envFrom:
                - configMapRef:
                    name: ml-pipeline-config
                - configMapRef:
                    name: minio-config
                - secretRef:
                    name: minio-secrets
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: stock-platform-secrets
                      key: DATABASE_URL_WRITER
                - name: STORAGE_BACKEND
                  value: "s3"
              resources:
                requests:
                  cpu: "500m"
                  memory: "1Gi"
                limits:
                  cpu: "2000m"
                  memory: "2Gi"
