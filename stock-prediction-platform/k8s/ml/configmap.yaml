apiVersion: v1
kind: ConfigMap
metadata:
  name: ml-pipeline-config
  namespace: ml
  labels:
    app.kubernetes.io/part-of: stock-prediction-platform
    app.kubernetes.io/component: ml-pipeline
data:
  MODEL_REGISTRY_DIR: "model_registry"
  SERVING_DIR: "serving/active"
  DRIFT_LOG_DIR: "drift_logs"
  LOG_LEVEL: "INFO"
  PIPELINE_VERSION: "1.0.0"
  STORAGE_BACKEND: "s3"
  MINIO_BUCKET_MODELS: "model-artifacts"
  MINIO_BUCKET_DRIFT: "drift-logs"
  # Feast / PostgreSQL connectivity (used by feast-materialize CronJob and feast-feature-server)
  POSTGRES_HOST: "postgresql.storage.svc.cluster.local"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "stockdb"
  REDIS_HOST: "redis.storage.svc.cluster.local"
  REDIS_PORT: "6379"
  FEAST_REPO_PATH: "/app/ml/feature_store"
