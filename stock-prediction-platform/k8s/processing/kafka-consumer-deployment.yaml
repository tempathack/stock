apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-consumer
  namespace: processing
  labels:
    app: kafka-consumer
    app.kubernetes.io/part-of: stock-prediction-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kafka-consumer
  template:
    metadata:
      labels:
        app: kafka-consumer
    spec:
      containers:
        - name: kafka-consumer
          image: stock-kafka-consumer:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: processing-config
            - secretRef:
                name: stock-platform-secrets
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            exec:
              command: ["python", "-c", "import sys; sys.exit(0)"]
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["python", "-c", "import sys; sys.exit(0)"]
            initialDelaySeconds: 10
            periodSeconds: 10
