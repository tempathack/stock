apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-consumer
  namespace: processing
  labels:
    app: kafka-consumer
    app.kubernetes.io/part-of: stock-prediction-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kafka-consumer
  template:
    metadata:
      labels:
        app: kafka-consumer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
        kubectl.kubernetes.io/restartedAt: "2026-04-08T19:45:00Z"
    spec:
      containers:
        - name: kafka-consumer
          image: stock-kafka-consumer:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9090
              name: metrics
          envFrom:
            - configMapRef:
                name: processing-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: stock-platform-secrets
                  key: DATABASE_URL_WRITER
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
